name: Bash validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Check Bash syntax
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Run ShellCheck
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
